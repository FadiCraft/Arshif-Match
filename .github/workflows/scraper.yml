name: Match Archives Scraper

on:
  schedule:
    - cron: '0 0 * * *' # يعمل يومياً منتصف الليل
  workflow_dispatch: # يتيح لك تشغيله يدوياً من واجهة GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Scraper Script
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add matches.json
          # نستخدم || echo حتى لا يفشل الـ workflow إذا لم يكن هناك تحديث جديد
          git commit -m "Auto-update matches JSON" || echo "No changes to commit"
          git push
