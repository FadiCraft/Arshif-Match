name: Match Archives Scraper

on:
  schedule:
    # يعمل كل 6 ساعات للبحث عن مباريات جديدة (يمكنك تعديل التوقيت حسب حاجتك)
    - cron: '0 */6 * * *'
  workflow_dispatch: # يتيح لك التشغيل اليدوي بضغطة زر من تبويب Actions في GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # إعطاء الصلاحيات اللازمة لرفع التعديلات (تحديث ملف JSON) على المستودع
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Initialize and Install dependencies
        # إنشاء ملف package.json مؤقت وتثبيت المكتبات فوراً
        run: |
          npm init -y
          npm install axios cheerio

      - name: Run Scraper Script
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add matches.json
          git commit -m "تحديث تلقائي: جلب أحدث المباريات" || echo "لا توجد مباريات جديدة لرفعها"
          git push
